spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/postgresdb?currentSchema=ib
    username: ib
    password: ib
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    schemas: ib
    create-schemas: true
    baseline-on-migrate: true
    locations: classpath:db/migration

server:
  port: 8080
